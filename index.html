<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌙 Nakshatra Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0c29;
            color: #fff;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #f5c842; margin-bottom: 20px; }
        .status { text-align: center; font-size: 12px; color: #43e97b; margin-bottom: 15px; }
        
        /* Location Bar */
        .location-bar {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 12px 0 16px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .location-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
            min-width: 120px;
            padding: 6px 0;
        }
        .location-bar input::placeholder { color: #666; }
        .location-bar button {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-weight: 600;
        }
        .location-bar .set-btn {
            background: rgba(245,200,66,0.2);
            border: 1px solid #f5c842;
            color: #f5c842;
        }
        .location-bar .set-btn:hover { background: #f5c842; color: #1a1a2e; }
        .location-bar .gps-btn {
            background: rgba(79,172,254,0.2);
            border: 1px solid #4facfe;
            color: #4facfe;
        }
        .location-bar .gps-btn:hover { background: #4facfe; color: #1a1a2e; }
        .location-bar .loc-status {
            font-size: 11px;
            color: #666;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
        }
        .location-bar .loc-status.active {
            color: #4facfe;
            background: rgba(79,172,254,0.1);
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 10px;
            border-left: 3px solid #f5c842;
        }
        .label { font-size: 11px; color: #888; text-transform: uppercase; }
        .value { font-size: 22px; font-weight: bold; }
        .nakshatra { color: #f5c842; }
        .pada { color: #6dd5ed; }
        .lord { color: #f093fb; }
        .sublord { color: #4facfe; }
        .subsublord { color: #43e97b; }
        .ayanamsa { color: #ff6b6b; }
        .location-display { color: #ffd93d; font-size: 18px; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .btn-group .btn { flex: 1; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f5c842, #f093fb);
            color: #1a1a2e;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .last-updated { text-align: center; font-size: 11px; color: #555; margin-top: 15px; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #f5c842, #f093fb);
            border-radius: 2px;
            transition: width 1s ease;
        }
        .coords-info {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
        }
        .notification-banner {
            background: rgba(245,200,66,0.12);
            border: 1px solid #f5c842;
            border-radius: 12px;
            padding: 12px 16px;
            text-align: center;
            margin: 12px 0;
            font-size: 14px;
            color: #f5c842;
            display: none;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .permission-box {
            background: rgba(79,172,254,0.08);
            border: 1px solid rgba(79,172,254,0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 10px 0;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }
        .permission-box strong { color: #4facfe; }
        .permission-box .btn { margin-top: 8px; padding: 8px 24px; font-size: 13px; }
    </style>
</head>
<body>

    <h1>🌙 Nakshatra Tracker</h1>
    <div class="status" id="status">● Ready</div>

    <!-- Location Bar -->
    <div class="location-bar">
        <input type="text" id="locationInput" placeholder="City or coordinates" value="New Delhi">
        <button class="gps-btn" onclick="getCurrentLocation()">📍 GPS</button>
        <button class="set-btn" onclick="updateLocation()">Set</button>
        <span class="loc-status" id="locStatus">📍 28.6139, 77.2090</span>
    </div>

    <!-- Notification Permission -->
    <div class="permission-box" id="permissionBox">
        🔔 Enable <strong>notifications</strong> for Nakshatra alerts
        <button class="btn btn-primary" onclick="requestNotificationPermission()" style="display:block;width:100%;">
            Enable Notifications
        </button>
    </div>

    <!-- Notification Banner -->
    <div class="notification-banner" id="notificationBanner">
        🔔 <span id="notifMessage">Nakshatra changed!</span>
    </div>

    <div id="content">
        <!-- Content will be inserted here -->
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="updateNow()">🔄 Refresh</button>
        <button class="btn btn-secondary" onclick="showHistory()">📊 History</button>
    </div>

    <div class="last-updated" id="lastUpdated">Loading...</div>

    <script>
        // ============================================================
        // STATE
        // ============================================================
        let userLocation = {
            lat: 28.6139,
            lon: 77.2090,
            city: 'New Delhi'
        };
        let lastNakshatra = '';
        let currentData = {};
        let notificationPermission = false;

        // ============================================================
        // COMPLETE 27 NAKSHATRA DATA
        // ============================================================
        const NAKSHATRAS = [
            { id: 0, name: "Ashwini", lord: "Ketu", symbol: "🐴", start: 0, end: 13.333 },
            { id: 1, name: "Bharani", lord: "Venus", symbol: "🐘", start: 13.333, end: 26.667 },
            { id: 2, name: "Krittika", lord: "Sun", symbol: "🗡️", start: 26.667, end: 40 },
            { id: 3, name: "Rohini", lord: "Moon", symbol: "🐂", start: 40, end: 53.333 },
            { id: 4, name: "Mrigashira", lord: "Mars", symbol: "🦌", start: 53.333, end: 66.667 },
            { id: 5, name: "Ardra", lord: "Rahu", symbol: "💎", start: 66.667, end: 80 },
            { id: 6, name: "Punarvasu", lord: "Jupiter", symbol: "🏹", start: 80, end: 93.333 },
            { id: 7, name: "Pushya", lord: "Saturn", symbol: "🐄", start: 93.333, end: 106.667 },
            { id: 8, name: "Ashlesha", lord: "Mercury", symbol: "🐍", start: 106.667, end: 120 },
            { id: 9, name: "Magha", lord: "Ketu", symbol: "👑", start: 120, end: 133.333 },
            { id: 10, name: "Purva Phalguni", lord: "Venus", symbol: "🛋️", start: 133.333, end: 146.667 },
            { id: 11, name: "Uttara Phalguni", lord: "Sun", symbol: "🛏️", start: 146.667, end: 160 },
            { id: 12, name: "Hasta", lord: "Moon", symbol: "✋", start: 160, end: 173.333 },
            { id: 13, name: "Chitra", lord: "Mars", symbol: "💎", start: 173.333, end: 186.667 },
            { id: 14, name: "Swati", lord: "Rahu", symbol: "🌿", start: 186.667, end: 200 },
            { id: 15, name: "Vishakha", lord: "Jupiter", symbol: "🏺", start: 200, end: 213.333 },
            { id: 16, name: "Anuradha", lord: "Saturn", symbol: "🌺", start: 213.333, end: 226.667 },
            { id: 17, name: "Jyeshtha", lord: "Mercury", symbol: "🐚", start: 226.667, end: 240 },
            { id: 18, name: "Mula", lord: "Ketu", symbol: "🌿", start: 240, end: 253.333 },
            { id: 19, name: "Purva Ashadha", lord: "Venus", symbol: "🐘", start: 253.333, end: 266.667 },
            { id: 20, name: "Uttara Ashadha", lord: "Sun", symbol: "🦣", start: 266.667, end: 280 },
            { id: 21, name: "Shravana", lord: "Moon", symbol: "👂", start: 280, end: 293.333 },
            { id: 22, name: "Dhanishta", lord: "Mars", symbol: "🥁", start: 293.333, end: 306.667 },
            { id: 23, name: "Shatabhisha", lord: "Rahu", symbol: "💊", start: 306.667, end: 320 },
            { id: 24, name: "Purva Bhadrapada", lord: "Jupiter", symbol: "⚔️", start: 320, end: 333.333 },
            { id: 25, name: "Uttara Bhadrapada", lord: "Saturn", symbol: "🧙", start: 333.333, end: 346.667 },
            { id: 26, name: "Revati", lord: "Mercury", symbol: "🐟", start: 346.667, end: 360 }
        ];

        // ============================================================
        // KP SUB-LORD SYSTEM
        // ============================================================
        const KP_SUBLORDS = {
            "Ketu": { subLord: "Venus", subSubLord: "Mercury", sign: "Aries" },
            "Venus": { subLord: "Sun", subSubLord: "Ketu", sign: "Taurus" },
            "Sun": { subLord: "Moon", subSubLord: "Venus", sign: "Gemini" },
            "Moon": { subLord: "Mars", subSubLord: "Sun", sign: "Cancer" },
            "Mars": { subLord: "Rahu", subSubLord: "Moon", sign: "Leo" },
            "Rahu": { subLord: "Jupiter", subSubLord: "Mars", sign: "Virgo" },
            "Jupiter": { subLord: "Saturn", subSubLord: "Rahu", sign: "Libra" },
            "Saturn": { subLord: "Mercury", subSubLord: "Jupiter", sign: "Scorpio" },
            "Mercury": { subLord: "Ketu", subSubLord: "Saturn", sign: "Sagittarius" }
        };

        // ============================================================
        // ASTRONOMICAL CALCULATIONS
        // ============================================================
        function getMoonPosition(date) {
            const jd = 2440587.5 + (date.getTime() / 86400000);
            const T = (jd - 2451545.0) / 36525.0;

            let L = 218.3165 + 481267.8813 * T + 6.3 * T * T / 3600;
            L = ((L % 360) + 360) % 360;

            const D = 297.85036 + 445267.11148 * T - 0.0019142 * T * T;
            const M = 357.52772 + 35999.05034 * T - 0.0001603 * T * T;
            const Mp = 134.96341 + 477198.86763 * T + 0.008997 * T * T;
            const F = 93.272 + 483202.0175 * T - 0.003402 * T * T;

            const Drad = D * Math.PI / 180;
            const Mrad = M * Math.PI / 180;
            const Mprad = Mp * Math.PI / 180;
            const Frad = F * Math.PI / 180;

            const deltaL = 
                6.289 * Math.sin(Mprad) +
                1.274 * Math.sin(2 * Drad - Mprad) +
                0.658 * Math.sin(2 * Drad) +
                0.214 * Math.sin(2 * Mprad) +
                0.186 * Math.sin(Mrad) +
                0.114 * Math.sin(2 * Frad);

            return ((L + deltaL) % 360 + 360) % 360;
        }

        function getAyanamsa(date) {
            const jd = 2440587.5 + (date.getTime() / 86400000);
            const T = (jd - 2451545.0) / 36525.0;

            const psi = 5038.7784 * T + 1.0726 * T * T + 0.000147 * T * T * T;
            const eps0 = 23.439291 - 0.0130042 * T - 1.64e-7 * T * T + 5.0e-7 * T * T * T;
            const omega = eps0 + 0.00256 * Math.cos(psi * Math.PI / 180);

            const ayanamsa = (psi / 3600) + (0.00256 / 3600) * Math.sin(omega * Math.PI / 180);
            return ayanamsa;
        }

        function getNakshatra(longitude) {
            let pos = ((longitude % 360) + 360) % 360;
            
            for (let i = 0; i < NAKSHATRAS.length; i++) {
                const n = NAKSHATRAS[i];
                if (pos >= n.start && pos < n.end) {
                    const pada = Math.floor((pos - n.start) / (13.333 / 4)) + 1;
                    return { ...n, pada, position: pos };
                }
            }
            const last = NAKSHATRAS[NAKSHATRAS.length - 1];
            return { ...last, pada: 4, position: pos };
        }

        function getKPDetails(lord) {
            return KP_SUBLORDS[lord] || KP_SUBLORDS["Ketu"];
        }

        // ============================================================
        // LOCATION FUNCTIONS
        // ============================================================
        function getCurrentLocation() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser');
                return;
            }

            document.getElementById('locStatus').textContent = '📍 Getting location...';
            document.getElementById('locStatus').className = 'loc-status';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation.lat = position.coords.latitude;
                    userLocation.lon = position.coords.longitude;
                    userLocation.city = `${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`;
                    
                    document.getElementById('locationInput').value = 
                        `${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`;
                    document.getElementById('locStatus').textContent = 
                        `📍 ${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`;
                    document.getElementById('locStatus').className = 'loc-status active';
                    
                    localStorage.setItem('userLocation', JSON.stringify(userLocation));
                    
                    // Update with new location
                    updateNow();
                    
                    showNotification('📍 Location Updated', 
                        `Using GPS: ${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`);
                },
                (error) => {
                    console.error('GPS Error:', error);
                    let msg = 'Unable to get location. ';
                    if (error.code === 1) msg += 'Please allow location access.';
                    else if (error.code === 2) msg += 'Location unavailable.';
                    else if (error.code === 3) msg += 'Location request timed out.';
                    alert(msg);
                    document.getElementById('locStatus').textContent = '📍 GPS failed';
                },
                { 
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 60000
                }
            );
        }

        function updateLocation() {
            const input = document.getElementById('locationInput').value.trim();
            if (!input) {
                alert('Please enter a city name or coordinates');
                return;
            }

            // Try to parse as coordinates
            const parts = input.split(',').map(s => parseFloat(s.trim()));
            if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                userLocation.lat = parts[0];
                userLocation.lon = parts[1];
                userLocation.city = `${parts[0].toFixed(4)}, ${parts[1].toFixed(4)}`;
                
                document.getElementById('locStatus').textContent = 
                    `📍 ${parts[0].toFixed(4)}, ${parts[1].toFixed(4)}`;
                document.getElementById('locStatus').className = 'loc-status active';
                
                localStorage.setItem('userLocation', JSON.stringify(userLocation));
                updateNow();
                showNotification('📍 Location Set', `${parts[0].toFixed(4)}, ${parts[1].toFixed(4)}`);
                return;
            }

            // Try to geocode city name
            geocodeCity(input);
        }

        async function geocodeCity(cityName) {
            try {
                document.getElementById('locStatus').textContent = '📍 Searching...';
                
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1`
                );
                const data = await response.json();

                if (data && data.length > 0) {
                    userLocation.lat = parseFloat(data[0].lat);
                    userLocation.lon = parseFloat(data[0].lon);
                    userLocation.city = data[0].display_name.split(',')[0];
                    
                    document.getElementById('locationInput').value = 
                        `${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`;
                    document.getElementById('locStatus').textContent = 
                        `📍 ${userLocation.city}`;
                    document.getElementById('locStatus').className = 'loc-status active';
                    
                    localStorage.setItem('userLocation', JSON.stringify(userLocation));
                    updateNow();
                    showNotification('📍 Location Found', userLocation.city);
                } else {
                    alert(`City "${cityName}" not found. Try coordinates like: 28.6139, 77.2090`);
                    document.getElementById('locStatus').textContent = '📍 Not found';
                }
            } catch (error) {
                console.error('Geocoding error:', error);
                alert('Error searching for location. Please use coordinates.');
            }
        }

        // ============================================================
        // MAIN UPDATE FUNCTION
        // ============================================================
        function updateNow() {
            console.log('updateNow called');
            
            try {
                const now = new Date();
                
                // Calculate
                const ayanamsaValue = getAyanamsa(now);
                const moonSayana = getMoonPosition(now);
                const moonNirayana = ((moonSayana - ayanamsaValue) % 360 + 360) % 360;
                
                const nakshatra = getNakshatra(moonNirayana);
                const kp = getKPDetails(nakshatra.lord);
                
                const result = {
                    nakshatra: nakshatra.name,
                    symbol: nakshatra.symbol,
                    pada: nakshatra.pada,
                    lord: nakshatra.lord,
                    subLord: kp.subLord,
                    subSubLord: kp.subSubLord,
                    subLordSign: kp.sign,
                    ayanamsa: ayanamsaValue.toFixed(4),
                    moonPosition: moonNirayana.toFixed(2),
                    timestamp: now,
                    location: {
                        lat: userLocation.lat,
                        lon: userLocation.lon,
                        city: userLocation.city || 'Unknown'
                    }
                };
                
                console.log('Result:', result);
                currentData = result;
                
                // Display
                displayData(result);
                
                // Check for change
                if (lastNakshatra && lastNakshatra !== result.nakshatra) {
                    showNotification('🌙 Nakshatra Changed', 
                        `${result.nakshatra} • Pada ${result.pada} • Lord: ${result.lord}`);
                }
                lastNakshatra = result.nakshatra;
                
                document.getElementById('lastUpdated').textContent = 
                    'Last updated: ' + now.toLocaleString('en-IN');
                
                return result;
                
            } catch (error) {
                console.error('Error in updateNow:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="card"><div class="label">Error</div><div class="value" style="color:#ff4444;">' + 
                    error.message + '</div></div>';
            }
        }

        // ============================================================
        // DISPLAY DATA
        // ============================================================
        function displayData(data) {
            const contentDiv = document.getElementById('content');
            
            const padaStart = ((data.pada - 1) * 3.333).toFixed(1);
            const padaEnd = (data.pada * 3.333).toFixed(1);
            
            const nakshatraInfo = NAKSHATRAS.find(n => n.name === data.nakshatra);
            const progress = nakshatraInfo ? 
                ((data.moonPosition - nakshatraInfo.start) / 13.333 * 100) : 50;
            
            // Location display
            const locDisplay = data.location?.city || 
                `${data.location?.lat?.toFixed(4) || '28.6139'}, ${data.location?.lon?.toFixed(4) || '77.2090'}`;
            
            contentDiv.innerHTML = `
                <div class="card" style="border-left-color: #f5c842;">
                    <div class="label">🌌 Nakshatra</div>
                    <div class="value nakshatra">${data.nakshatra} ${data.symbol}</div>
                    <div class="progress-bar">
                        <div class="fill" style="width:${Math.min(progress, 100)}%"></div>
                    </div>
                    <div style="font-size:11px;color:#555;margin-top:4px;">
                        Moon: ${data.moonPosition}° (Nirayana)
                    </div>
                </div>

                <div class="card" style="border-left-color: #6dd5ed;">
                    <div class="label">📍 Pada</div>
                    <div class="value pada">Pada ${data.pada} / 4</div>
                    <div style="font-size:12px;color:#888;margin-top:2px;">
                        ${padaStart}° - ${padaEnd}°
                    </div>
                </div>

                <div class="card" style="border-left-color: #f093fb;">
                    <div class="label">👑 Lord</div>
                    <div class="value lord">${data.lord}</div>
                </div>

                <div class="card" style="border-left-color: #4facfe;">
                    <div class="label">🔱 Sub-Lord (KP)</div>
                    <div class="value sublord">${data.subLord} (${data.subLordSign})</div>
                </div>

                <div class="card" style="border-left-color: #43e97b;">
                    <div class="label">✨ Sub-SubLord (KP)</div>
                    <div class="value subsublord">${data.subSubLord}</div>
                </div>

                <div class="card" style="border-left-color: #ff6b6b;">
                    <div class="label">🧮 Ayanamsa (Lahiri)</div>
                    <div class="value ayanamsa">${data.ayanamsa}°</div>
                </div>

                <div class="card" style="border-left-color: #ffd93d;">
                    <div class="label">📍 Location</div>
                    <div class="value location-display">${locDisplay}</div>
                    <div class="coords-info">
                        Lat: ${data.location?.lat?.toFixed(6) || '28.613900'}° 
                        Lon: ${data.location?.lon?.toFixed(6) || '77.209000'}°
                    </div>
                </div>
            `;
            
            document.getElementById('status').textContent = '● Live';
            document.getElementById('status').style.color = '#43e97b';
        }

        // ============================================================
        // NOTIFICATIONS
        // ============================================================
        function showNotification(title, body) {
            const banner = document.getElementById('notificationBanner');
            document.getElementById('notifMessage').textContent = `${title} • ${body}`;
            banner.style.display = 'block';
            
            if (Notification.permission === 'granted') {
                try {
                    new Notification(title, {
                        body: body,
                        icon: 'https://cdn-icons-png.flaticon.com/512/3176/3176366.png',
                        vibrate: [200, 100, 200]
                    });
                } catch(e) {}
            }
            
            setTimeout(() => { banner.style.display = 'none'; }, 10000);
        }

        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                alert('Notifications not supported');
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    notificationPermission = true;
                    document.getElementById('permissionBox').innerHTML = 
                        '✅ Notifications <strong>enabled</strong>!';
                    document.getElementById('permissionBox').style.borderColor = '#43e97b';
                    showNotification('🌙 Nakshatra Tracker', 'Notifications are working!');
                } else {
                    document.getElementById('permissionBox').innerHTML = 
                        '⚠️ Notifications <strong>denied</strong>.';
                    document.getElementById('permissionBox').style.borderColor = '#ff4444';
                }
            });
        }

        // ============================================================
        // HISTORY
        // ============================================================
        function showHistory() {
            const history = JSON.parse(localStorage.getItem('nakshatraHistory') || '[]');
            if (history.length === 0) {
                alert('📊 No history yet.');
                return;
            }
            let msg = '📊 Recent Nakshatra History\n\n';
            history.slice(-10).reverse().forEach(e => {
                msg += `${e.time} | ${e.nakshatra} | Pada ${e.pada} | ${e.lord}\n`;
            });
            alert(msg);
        }

        function saveHistory(data) {
            const history = JSON.parse(localStorage.getItem('nakshatraHistory') || '[]');
            history.push({
                time: new Date().toLocaleString('en-IN'),
                nakshatra: data.nakshatra,
                pada: data.pada,
                lord: data.lord,
                subLord: data.subLord
            });
            if (history.length > 100) history.shift();
            localStorage.setItem('nakshatraHistory', JSON.stringify(history));
        }

        // ============================================================
        // INITIALIZE
        // ============================================================
        function init() {
            console.log('Initializing...');
            
            // Load saved location
            const savedLocation = localStorage.getItem('userLocation');
            if (savedLocation) {
                try {
                    const parsed = JSON.parse(savedLocation);
                    userLocation = parsed;
                    document.getElementById('locationInput').value = 
                        `${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`;
                    document.getElementById('locStatus').textContent = 
                        `📍 ${userLocation.city || userLocation.lat.toFixed(4) + ', ' + userLocation.lon.toFixed(4)}`;
                    document.getElementById('locStatus').className = 'loc-status active';
                } catch(e) {}
            }
            
            // Check notification permission
            if ('Notification' in window && Notification.permission === 'granted') {
                document.getElementById('permissionBox').innerHTML = 
                    '✅ Notifications <strong>enabled</strong>!';
                document.getElementById('permissionBox').style.borderColor = '#43e97b';
            }
            
            // Override saveHistory to auto-save
            const originalDisplay = displayData;
            displayData = function(data) {
                originalDisplay(data);
                saveHistory(data);
            };
            
            // Update immediately
            const data = updateNow();
            if (data) {
                displayData(data);
                saveHistory(data);
            }
            
            // Auto-refresh every 5 minutes
            setInterval(updateNow, 300000);
            
            console.log('Initialization complete');
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>

</body>
</html>
